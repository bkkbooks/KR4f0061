front:
  text: 容甫先生遺詩卷二
  hash: sha256:242dcb493ae9b3a9aff3fe20497e6611e6e84141aea65cc032596d33a8f17fc3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0061_SBCK_002-1a}
body:
  text: 著雍困敦劒潭移居身世飄零我自嗟十年三見汝移家蒼苔行處冰猶滑社燕歸時日未斜秋雨尚沾鄰院葉春風欲動過門車最憐月出琴停夜相對寒梅一樹花早發靑萍港日出江霧明餘寒散林薄重陰冒遠川悲風靜幽壑山靑雲曖曖草白霜漠漠宿莽下飢禽洑流聚漂籜昏曉異栖屯心物共淪鑠早懷一飯恩終棄百金諾功名久未立義故將焉託傷哉啜菽歡生涯思負郭聖恩寺作沿回積峽起道路豁平林雲木四邊合煙中淸磬音孤亭望無際明湖澄半陰曖曖江梅出遲遲春意深亭午暄風散氤氳不可尋日暮松聲起空山聞鼓琴徒令遠遊客結此幽栖心春申里郢都徙後勢猶強封邑江東見井疆豈謂上書歸質子終思當國代孱王靑山冰雪春流遠池有春申澗喬木歌鐘故里荒回首棘門無望禍可憐珠履滿君堂野望西山朝旭隱高城城下淸霜百草平沙岸風回江鳥墮松林雪霽寺樓明澤冰乍合魚猶上磽土方堅麥未生病後心懷自知少負薪終日逐人行相見曲相見復相見君心一朝變杯酒定人情身危易恩怨大隄曲東風吹江水花開照顔色相思人未歸日暮隄上立吳趨行東南入吳趨通門廣且修舟車萬方㑹夜行晝未休靑槐夾大道白日麗朱樓列肆陳曼衍美女揚清謳橫波醉流轉巧笑心和柔長裾隨風舒翩翩身若浮娛樂未云已心悲不可留策馬上西山高舉望八幽浮雲翳城闕俯見江海流讓國感延陵習禮思言游斯人不同代望古徒殷憂檢感舊集有作源出睂山見一支萬卷未停披高才淩厲稱詩日暮歲凋零學佛時宦跡自殊老姓名曾重碑報恩尚有在身後淸芬屬侍兒詠史效左記室呂尚西入周渭上猶盤桓百里棄其國飯牛在草間乘時各自奮功立名不刋脫身屠釣中一舉生民安少壯不用世垂老反任官年命苟不延後世何所觀高材為人棄貧賤良獨難焉知天下士一身飢且寒聖賢有不遇自古以為歎怨詩皎皎齊紈扇是妾手中織懷此冰雪姿得親君子側屬當歡愛時豈謂薄寒積一入蛟龍篋恩光自此畢願託涼風起不見君顔色白秋海棠成詠淚眼啼煙似有情翩翩粉蝶趁秋晴三更露下涼如水苔院無人月自明宮怨高樹明河隱殿闌風簾不下夜燈殘玉階秋草無行跡坐對三更白露寒將赴江寧題所居東軒屋裏圖書作四鄰庭前竹樹正三春老親嬌女團圞坐身是天涯乞食人客中食蟹作陂水西風上釣闌巨螯獵獵帶霜寒漬餘白酒香噴甕和入黃柑汁滿盤旱歲魚鹽生物少貧時蝦菜食鮮難老親病後無兼味掩淚尊前對晚餐古詩炎州榮橘樹華實共葳㽔秋風發奇色緑葉正含滋蹉跎白日晚霜雪迫前期古香徒自悅獨秀歲寒時空山人不見奈此佳人姿受命生南國悲君白玉墀食葅早秋嘗㫖蓄數莖味猶正酸鹹歷四時終存歲寒性示僕同生非有屬因勢遂相役百年詎自免一作吾詎免念此一作情恕罕苛貴貧居纍人事早作暮未息天寒井爨苦一飽愧安食貴賤各有謀相爭盡智力歎彼勞心人無營覺爾適宿上天竺倦游情未極改轍方遵一作循麓涓涓石瀨濺裊裊梯徑曲松聲雜魚梵暝色歸樵牧空翠緣目生孤雲共人宿山月翳一作隱寒樹風泉靜修竹旅夢戀宵鐙羈心向晨旭天淸光始霽巖深氣猶肅疉嶺霧霏霏高一作疏林風穆穆往返迹未淹棲尋日苦促徒抱憂生嗟斯焉願投足甘露寺一作北固甘露寺北固巉巖勢如削怒搏滄江危欲落洪波觸山飛雨來山根晝夜鳴風雷孤亭直上萬木杪淸江白日無氛埃中流砰訇兩山動翠屏金碧當空開飛鳶跕跕不到地側身縹眇心為摧長風浩浩奔扶桑浮天海氣靑茫茫魚龍物怪那可
