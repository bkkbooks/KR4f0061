front:
  text: 容甫先生遺詩卷四
  hash: sha256:e203feaa9f021569a4b77e11fcc1b1e343fda687ac765d7c9b91e0fee44c24ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0061_SBCK_004-1a}
body:
  text: 上章攝提格黃將軍得功飮水銅瓢歌將軍藁葬靑一作方山麓宰卽梓字樹風彫碣無字雲旗犀甲飛作塵猶有銅瓢鎭初地因思上馬勢如鶻霹􅆮一呼齒一作眥盡裂銅花繡水生朱殷滲入星星口中血江天暮雨鮫氣腥陰風颯颯翔羣靈此時篝火叢祠下神物终宵鏗有聲友人鄭韓城丙子歲夢大雪身一本無身字臥其中以爲不祥俄而其尊公及太夫人相繼沒世因爲圖以志哀而中作此一作是詩人生事親日一往不復反如何百年身及此妖夢踐豈伊五行失咎徴應災沴天􅁥孝子心先事告其變故物满眼在逝者日巳遠溫凊思寢門體魄痛甫竁年康養不逮身躓名未顯平生如昨日悲來不可遣作圖尺幅上流涕日開展持此終身慕用答劬勞願白雲太行道風雨梁山緬悲心同一發大人志推衍能事媿迫促多憂日展轉天雨道少人日中過君飯寫此危苦詞爲廢蓼莪卷聞陳並囦至貧賤吾猶在關心舊友來浮生媿知已渴一作淳意苦憐才書策思同席湖山對舉杯三年奔走倦今得笑顔開宫詞曉露侵簾濕春日上階遲自調鸚鵡語花下立多時別母細雨春鐙夜欲分白頭閒坐話艱辛出門便是天涯別明日思親夢裏人梅花孤館寒梅發春風款款來故園花落盡江樹一作上一枝開過龍江關井邑千家夾岸喧浮橋列檝望關門魚鹽近市商人喜鼔吹臨江榷吏尊春水蛟龍浮舊窟夕陽烏雀下荒村華衣椽使鬚睂老㑹計雄心長子孫客散客散虛堂靜風簾倦不鈎松篁明夜月枕簟入淸秋親老兼多病身孤更遠遊未應中㝛鳥相對尚啁啾㝛龍江孤客龍江上鄉心一夜生疎星漁舍火寒雨戍樓更野曠秋衾冷窗虛水氣明不眠時起舞無意聽雞鳴贈黃仲則六首自余習文翰高謝同時流次􅀸旣夭折謂魏題橋哲兄悲遠遊謂夢旂長歗宇宙間萬物同悠悠常恐朝露期斯人不可求落拓吾何慚餘生見英物􅁯言溫雪交作合郢人質歡娛未云晩相期在華髪鬱鬱上崇臺俯見平野闊白日動江光浮雲向空􅃿長揖對靑山懷古涕如雪早孤感同病心期樂疏曠各懷萬里心高視重雲上長途未及展白雲聊孤倡相對一賞音信㝛巳興􅉪巳矣吾生窮飛騰竟何望鹿馬無定􅄱白黑隨轉移況此磊落人心迹難自持高才世不容孤立尚相疑衆中獨見親謠諑固其宜素心苟不媿人言亦何爲傷茲不肖身波累並朋知勞生無百年多難使人悲飛雨江上來春鳩鳴我軒開樽列華燭四座多歡言蹉跎異鄉樂各道平生親賓客徒满堂不見所思人披衣臨前除夜坐常及晨高歌對尊酒誰知傷我神黃金不可鑄榮名非吾寶傾心託友生邂逅願終好一室尚離羣江湖況遠道分手知前期後會慮難保及此同時居相見常苦少悔予求友心沈憂爲爾老吾生吾生應有命身世兩相違客路中江遠鄉心北雁稀聽歌翻灑淚入夢蹔如歸爲憶臨行日心傷篋裏衣心計長如夜思親枕未安寄居時見迫衰序早知寒女手謀生拙貧交仰食難尚憐游子意書到屢相寛孤露惟依母漂零正苦貧勞生筋力盡暮景笑嗁眞親戚皆他縣扶持只一身白頭空有子終歲走一作傍風塵聽鐘鳴聽鐘鳴鐘鳴何時息風定忽一停漏盡如更急靑鐙熒熒羅幔卷秋衾臥病夜一作時展轉憂生來日促思親故鄉遠不寐聽鐘鳴鐘鳴淒復淸聲聲數巳盡秋天猶未明泰伯祠賢親讓天下開國治周禮墨胎悲伯夷朝鮮尊箕子勾吳巳亾國至德终不餒雜詩羣居共晨夕志好同衣衾豈知歡愛日終非可恃心長路無停軌江河阻且深㝛昔遠遊志一作夙昔念遠遊裵回空至今孤鳳息池潢翠羽含風弱中逵荆枳生露下桐華落長閟丹山采偃仰争餘啄本無千仞翔不敢怨啁雀零露漸野草湛湛朝欲晞日出城隅路淸風吹我衣􅆼窕秦川女厭浥獨行時朱顔發光澤灼灼暎晨暉徒懷抱柱信相逢終自疑不惜千金珮何由一作因通我辭寸心一不諒枉􅀒桑中期鶴脛不可斷鳧脛不可續物性有自然何爲苦羈束雲泉自高下魚鳥翩相逐本無百年命安危同所欲棲遊非一途微生各自足初日照高樓飛軒交綺疏佳人挾鳴瑟當戶歛華裾坐惜傾城貌十年常獨居悲風激幽響行路立踟躕不爲感人耳淸歌聊自娛贈王生與君同作他鄉客咫尺天涯歸不得江南二月天氣和節物感人悲旅食城東古寺行人稀雜樹蒙茸碧草齊長鑱共劚春泥裂日暮僧房煮筍時周生刻印歌周生秀而臞刻印通小學印文落紙不可捫觸手軒然起棱角丹砂萬杵如月明照見鈎心苦鏤琢國初程穆倩近人丁敬身周生晚岀老更成文彭以後凡三人嚴冬江風寒杖策叩我門出此八寸􅁽一一古意存森然淸廟列庸器牛鼎山尊寫銘識扶風石鼓嶧山文脫手淋漓見生氣漆書出土字斑斑魯削餘痕尚廉利吁嗟古文日淪喪謂是秦斯丈人行豈知卓犖眼中人猶自同堂相揖讓周生作畫兼有神興來落筆能逼眞壯心空秏千年上垂首風塵常苦貧乃知奇技難爲用應作東西南北人重光單閼山長沈公蒙恩賜幣恭紀内官宣命早上幣岀彤闈猶見封題濕爭看拜舞歸七襄天女製一品老臣衣圖入香山㑹光榮有賜緋三月二十一日夜和仲則叢薄風生窗淅淅夜火欲盡作青色病客獨坐毛髪立鬼適何來太相逼颯然雨落林烏嗁空堂曳革行來遲一作履聲曳地來何遲終夜作索心然疑天明向壁塊然卧與汝相守能幾時細雨一本題云暮雨細一作暮雨打蓬雨轉急依沙繫纜江氣腥沙崩險絕不可上脚底水石喧一作豗相爭天昬地曠絶一作罕聞見孤客失路還一作愁屏營寒叢出火就一作夜投㝛入門老嫠兼孤嬰􅳋一作迥然四顧但一室蹤跡人鬼疑一作終難憑菜羹麥飯各冰冷飢腸内熱癡蠅鳴攲斜一作參差竹柵臥踏地江風燐火吹熒熒水蟲毒蠆一作蠚共高枕草頭雨落珠璣明人生到此百慮息一作絶雖無噩夢魂屢一作常驚天明出屋始得路沙禽蒲一作浦柳相逢迎開帆打鼓一長歗靑一作春山空翠隨人行晴天曠野一作望更淸絶朱霞眀滅朝煙生百年憂樂㑹如許一作此寸一作中心坷坎一作坎坷何由平代白紵詞開帷纖纖行且卻輕軀一作腰細步風前弱玉捥凝香素綃薄蒲桃金巵爲君酌朱顔暈酒目生光橫波送笑流满堂善知人意樂無方金環散珮明月璫曼歌掩袂迴人腸百年今日安可􅁯長槐靑靑桂華碧淸江月出歌管急四座沈吟意緜脈紅燭參差􅀝寶瑟迴襃萬松坪平臺列松磴萬木臨迴溪蒼蒼白雲合俯見羣峯齊遠陰薄日午風露轉淒迷一作遲氣交土石潤冬景秀柔荑何時布莞弱杖策坐丹梯去杭州留别沈莊士江國登樓巳浹辰江山回首重傷神殘年乞食知何處異地無交尚累人夢裏衰容空憶母病餘短策獨隨身相思若問生還日春水南歸有鴈賓采薇子墓長歗軒轅臺淸風天地肅悠悠土室心餘生託柔蔌幽扃百年閟秀氣函冰玉何人采逸詩風期緬孤竹一笑一一作自笑謀生拙夷途聚一作起百憂命應逢彀弩心不怒虛舟落魄一作拓多淸議狂名有下流由來伐檀者一作志非是一作獨爲恩讎題友人寒山曉發圖苦霧初披萬木丹嚴霜欲下四山寒天淸野曠無人識輸與征夫徹曉看題秋江聽笛圖露氣蒼涼水氣淸亂蘆顛倒一舟橫枯風裂竹秋江上更有何人聽此聲
