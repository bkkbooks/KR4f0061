front:
  text: 容甫先生遺詩卷三
  hash: sha256:1e82dd5c79594f1d6e7ea3ac84100489ecfa4267cfec1c09046535ab2c729e56
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0061_SBCK_003-1a}
body:
  text: 屠維赤奮若明督師一作太傅史公享堂故明丞相有祠堂亂後衣冠此地藏宮府武侯猶拜表江淮信國自勤王曲城車馬通神道瘠土松杉接一作按戰場異代襃忠逢聖主詔書史法兩輝光觀魯示所作贈鄭舍人晴波高格􅇝響一作高秀雄深使人神王昔與舍人同客江陰追敘遊歴作此却寄時觀魯亦往江陰卽以送之我昔孟冬南渡江一作渡江去江潮一作漲始一作四落呈一作見崖棱一作崖生稜舍人開篋一作在路示我詩入手但覺雲霞蒸中流叩舷一作放舟誦石鼓力與水勢爭吰噌暮投山店四肢惰山閣憑空見星火絶壁雲陰腳下生徹夜江聲枕上一作邊過月落一作出聞馬嘶一作月落風正寒門外風色一作氣寒霜淸萬木秀霽景一作色明林端紆迴七一作百十里下見漕河乾練湖草動北風起白塔朱樓照湖水黃沙撲面人卻行車輪格格官路平寒一作晴天日落四山紫疲馬向城時一鳴江陰古寺遇人寡一作江陰作客出門寡雙柏婆娑雪沾灑一作松邪柏邪坐其下天風振柯一作樹龍自一作一吟佛殿陰陰夜飄瓦興來著屐君山巔側身四望一作顧心􅃼然日光海氣伏不動時見空中生紫煙當時相樂自如此別來蹤跡東西水故人身􅀡一作入承明廬石室三年讀秘書豈是文章貴一作在敏疾高文典冊用相如吾兄一作見今詩伯一作吾今見詩伯長歌動光彩鼓柁東南征所見足吁駴胸中五嶽起未平更賦高邱望遠海平山平山山下路寒食有炊煙歌管停春社樵蘇問一作向墓田賦詩金谷宴脩禊永和年舊日經行地風流在眼前䢴溝夫差廟吳王舊廟蜀山陂溝水東流繞殿基春社神巫時擊鼓好風賈舶一作客互揚旗侈心齊晉終亾國遺利江淮合薦祠可憶姑蘇臺上樂靑山歌舞對西施焦山鼎歌三代法物今尚存太學石鼓焦山鼎四周一作圍刻作雲雷形光澤照人淸一作靑耿耿其上有耳下有足古尺旣亾不可省古文款識九十三下視孔悝非其等王曰世惠惟女賢錫女器服由史端世惠作鼎享列一作烈祖煌煌策命載天府同時若有吉甫誦豈異韓侯召公虎千年神物化不盡遂使元英陳大呂朱霞照水日西落閃暎丹砂色噴薄土花隱起暈靑翠石壁雲嵐静交氣淸江月出光满堂掣電驚蛟見銘字汾陰泗水各有畤寶玉大弓爲盜資當年鑄此象百物神姦恨不圖分宜焦山百里限風水深巖幽怪藏瓌奇浮雲金景望不見爲君作此寶鼎詩雨中趙州社觀牡丹一本題云應方夫民作江干飛雨暗騰騰初地花開豔不勝欲舞自一作乍隨風力轉似啼猶見眼波澄一簾香氣凝春霧五夜霞光對佛鐙惆悵東林高㑹日閉門心迹我如僧至聖夫子像明世宗時􅄟今資福寺後山長沈公培土爲冢垣周之率諸生行舍奠禮恭紀澤宮旣穆􅁲東徙得軒敞袞衣肅天表夏屋封吉壤太牢缺命祀有司亡簿掌百年蔭喬木地靈見滋長牛羊一作羊牛不敢踐風雨蔽塵坱師儒坐膠序秀士列州黨豈念魯城北習禮時一上先生秉至敎正學距羣枉來嗣臨川席猶見杏壇丈岀游過佛寺瞻拜心愴怳一作恍束脩解橐中官物惜公帑尚行夫子志馬鬛存一作相規倣築牆封四周貞石立高􅖑遠山靄靑翠秋氣浮沆碭竹樹交城阿風一作雲日共駘一作蕩釋奠羞牲魚昔一作㫖酒薦尊盎樂備八一作六佾舞禮簡罷尸􅁚斯文當在茲庶幾精意享一作旁聖人不可作威儀感夢想法由圖畫變事一作制非釋一作佛老攘詔書始元豐郡國盡一作畫塑像遷廟禮旣成夾室藏可仿魯人觀禮器墓􅀕自疇曩檀弓言物始斯道固宜廣賢者在一作居人國舉措爲世仰一事預名敎竭力務培養況復神所依祀典通肸蠁肅對在天靈森然動精爽􅃘見陵谷移嗚呼委榛一作草莽中也陪執事於心勞嚮往車服展遺物金石聆幽響具一作肅觀典禮盛忠敬非外強作歌告後世用配兩廡饗送姚淩霄赴􅃟兼憶舊事漫成二首五月燕山別一作相送燕山别盤桓惜累旬素心忘世味黃綬屈詩人道貌脩髯美交情絮語眞國恩存一命珍重一作何以荅斯民一作何以謝斯民行間誇結束往事喜論兵走險初驚鹿成圍未翦鯨戈船波欲震燐一作夜火雨猶一作長腥邈矣朱一作珠崖郡無由一作因問賈生寄顧寅初舊友何人在高懷顧阿瑛風塵容倦客尊酒見平生親有童孫樂詩兼道骨清草堂江上棹應識隱居情擬古一本題云十五十五盧家女深居酒市傍曲成能敎弟繡罷只依孃過門聽步屧隔幙想飄香寕知難一見愛惜爲王昌餽山長沈公家園扁豆學圃關心十畝閒豆苗九月未凋殘西風满架花開密白露中宵墮一作墜葉寒老母閒居曾手植先生晚食一作飯好加餐秋菘春韭山家味多媿投身在玉盤不平九折行山自不平蝸牛蠻觸苦相争女蘿抱樹應騰秀木槿開花正向榮習舞諒須長襃好汲泉誰問在山淸更憐負子桃蟲苦化作蜉蝣又一生酬許掖之兼柬薛藹人望屋饑驅愴客懷分金高義古人偕知君歲晩貧如洗歎我途窮衆不諧雪夜孤鐙安旅㝛春盤生菜坐蕭齋同時薛復應難得乞米殷勤一作然爲拔􅁫寄弟端光白華秀巖一作空谷孝子心苦悲幸逮百年養食貧常阻饑浹辰一作旬被淋雨道路一作苦人跡稀子無一金產何以自支持立身苟不媿貴賤同所歸有才不用世天意一作命安可知吾生方多憂一作虞相見未有期愛子千金軀令名無巳時懐晚芝先生中事晚芝先生二年至敎無隱實啟蒙心以中孤貧有母尤愛憐之繼一作周其不足而撫一作慰其無依藹然和一作仁風之被物一作萬物也及一本此下有辛卯二字先生歸里中窮窘益甚一作百端一本此下有更無可告者五字長夜一作深宵展轉乃作此詩古人所以有感知己賦也羈貧心易悲世故多所虞大人能博愛善氣時以濡慰恤及一作達私隱始願恒見逾寵積不自異勢去乃日孤一本無此二句親愛巳忠竭他人焉足圖窮居念恩遇始覺平生一作生平殊謀身争一發造命在斯一作期須巳盡生人苦反惜不肖軀江湖向南望思心與涕俱嘉樹嘉樹挺秀色深山交沍陰朔風一以至琤琤傳遠音豈畏歲時晚幽獨委空林但恐春華發無復霜雪心歲暮寒風翦翦歲交除深巷人來轍迹疏雪後汲泉朝祀竈鐙前藉草夜繙書名心未盡因謀養世議方寛足遂初好是臨卭長作客得敎壁立似相如除夕作季冬北風勁朝日下地白在賤多隱憂歲盡人事迫鑿冰持作糜朝炊不及夕明知禮數簡所過皆削迹端居對古人揖讓展墳籍高言王霸略衣食苦無策落魄媿淸時困窮非所惜一本無此二句旁皇四海中一身將何適素志悲伐檀陟屺傷行役岀處俱違心親交苦一作告不悉
