front:
  text: 容甫先生遺詩目錄卷一
  hash: sha256:61566b85a78e78bb1472bcc2fca00e9031d259debc17cd311c6bdb24f1c2b94a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0061_SBCK_000-1a}
body:
  text: 旃蒙作噩靜夜柔兆閹茂過張明府歸耕操秋夜舟中作古詩荅方立堂緣情感迫多哀怨之音古詩夜坐白鳥彊圉大淵獻代李泌建寕王挽辭幷序唐建寕王倓旣以讒死大歴三年加謚承天皇帝遣使迎喪彭原旣至城門喪輴不動代宗謂李泌曰豈有恨耶􅀸往祭之以白朕意且􅀸及知倓艱難定策者泌爲挽辭二解追述倓志命挽士唱沁因進酹輴乃行觀者皆爲泣下今泌集亾其辭爲補之云爾旅食趙忠毅東方未明之硯歌爲椒園先生作玉畫叉歌爲椒園先生作悲落葉荅觀魯三首講院老樹歌故家呈秦丈西巖卷二著雍困敦劒潭移居早發靑萍港聖恩寺作春申里野望相見曲大隄曲吳趨行檢感舊集有作咏史效左記室怨詩白秋海棠成詠宮怨將赴江寕題所居東軒客中食蟹作古詩食葅示僕㝛上天竺甘露寺卷三屠維赤奮若明督師史公享堂觀魯示所作贈鄭舍人晴波高格􅇝響使人神王昔與舍人同客江陰追敘遊歴作此卻􅀉時觀魯亦往江陰卽以送之平山䢴溝夫差廟焦山鼎歌雨中趙州社觀牡丹至聖夫子像明世宗時􅄟今資福寺後山長沈公培土爲􅃁垣周之率諸生行舍奠禮恭紀送姚淩霄赴􅃟兼憶舊事漫成二首寄顧寅初擬古餽山長沈公家園扁豆不平酬許掖之兼柬薛藹人􅀉弟端光懷晩芝先生中事晩芝先生二年至敎無隱實啟蒙心以中孤貧有母尤愛憐之繼其不足而撫其無依藹然和風之被物也及先生歸里中窮窘益甚長夜展轉乃作此詩古人所以有感知己賦也嘉樹歲暮除夕作卷四上章攝提格黃將軍得功飮水銅瓢歌友人鄭韓城丙子歲夢大雪身臥其中以爲不祥俄而其尊公及太夫人相繼沒世因爲圖以志哀而中作此詩聞陳並囦至宮詞别母梅花過龍江關客散㝛龍江贈黃仲則六首吾生聽鐘鳴泰伯祠雜詩贈王生周生刻印歌重光單閼山長沈公蒙恩賜幣恭紀三月二十一日夜和仲則細雨代白紵詞傷心曲七夕采石登太白樓題壁留示仲則元黓執徐自君之出矣擬古萬松坪去杭州留別沈莊士采薇子墓一笑題友人寒山曉發圖題秋江聽笛圖卷五閼逢敦牂傷楊東木㝛錢唐江上消息秋萍過常州旃蒙協洽贈對琴先生田家九日江上逢儲玉琴昔與玉琴器之劒潭九日集樂善庵日暮求酒不得黯然而散今忽巳十年有悲前事因作此詩題信貞婦高柳鳴蟬畫扇有序貞婦於中爲表姑中四五歲嘗遊其家爲所保抱及昏於信氏數月而夫殁立子取婦未久子又殤通詩書能畫窮乃至於斯其可悲也今觀其畫扇繫以詞柔兆涒灘千里呈均弼先生柳塘屠維大淵獻呈均弼先生昭陽單閼鷲峯寺有感呈均弼先生秦淮雜詩白門感舊著雍涒灘江上失題題機聲鐙影圖中年多病久不作詩比至居憂此事遂絶某出此卷索題有傷其事聊作數章以當一哭孤子汪中記乾隆五十三年十二月昭陽赤奮若贈別吳白庵題曾賓谷都轉西溪漁隱圖江寕顧蘭臺鐫容甫先生遺詩題辭劉台拱汪中字容甫江都拔貢生博聞強記通知古今才學識三者皆有以過人爲文鈎貫經史鎔鑄漢唐閎麗淵雅卓然自成一家早歲喜爲詩三十以後絕不復作舊藳多散失今錄其僅存者若干首喜孫謹按劉先生校述學幷寫定遺詩喜孫益肆􅊧羅都爲一冊有朋舊遺詩入􅃟而茲冊未載以先大夫草藁自刪不敢有加焉喜孫記
