front:
  text: 容甫先生遺詩卷五
  hash: sha256:057859d72843beead5f99f47f010629c1596744d3e20367272f8e3e80290ddb8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0061_SBCK_005-1a}
body:
  text: 閼逢敦牂傷楊東木馬上相逢記望塵十年心事合離因貧曾寄食兼扶病老尚求官遽殁身子姓同時家欲盡圖書四散蹟猶新從今俠氣憑誰語江畔孤蹤獨一作益愴神㝛錢唐江上羅刹江頭桃李一作柳春東風吹一作飄雨黯消魂一作傷神素車白馬休相問我亦蘆中喚渡人消息消息傳江上風沙满目昬猶聞一路哭巳解萬人屯財賦通吳㑹帆檣下海門尚思衣食樂生養累朝恩秋萍寒流如鏡碧煙和貼貼靑萍岀澗阿影動疏星秋欲曙風迴落木水生波潛魚墜散衝無數古岸潮平聚更多自是浮生易漂泊不因霜露怨蹉跎過常州百里延陵問一作間水程西風如舞一舟輕亦知休息終無日尚有昻藏媿此生雪夜夢回驚犬吠􅂽天人定畏鴟鳴恰當晩歲飄零日好助淒涼倦客情旃蒙協洽贈對琴先生燕市黃金舊有臺誰令白首困蒿萊故家文物歸春夢浮世交情問死灰老去一身常健飯貧餘二子各成材近聞學易通消息時命悠悠未可哀田家門前衆峯秀屋後流泉鳴山田晚穫美鳥雀多歡聲兒女满場圃愛此冬日晴朝舂留過客因識主人情九日江上逢一作遇儲玉琴昔與玉琴器之劒潭九日集樂善庵日暮求酒不得黯然而散今忽已十年有悲前事因作此詩城東雙樹記婆娑城上一作下西風動女蘿落葉無端悲壯士窮途相聚祇狂歌驚心歲月中年速過眼雲煙舊恨多今日樽前重握手扁舟江上奈愁何題信貞婦高柳鳴蟬畫扇有序貞婦於中爲表姑中四五嵗嘗遊其家爲所保抱及昏於信氏數月而夫沒立子取婦未久子又殤通詩書能畫窮乃至於斯其可悲也今觀其畫扇繫以詞曰承露無揚風有聲解化稱此懷淸柔兆涒灘千里千里關河七尺身長年逐一作乞食一作客傍風塵眼前冠葢誰容我老去飢寒尚累親智慧不來空拊髀雲山如夢祗一作易淒神平生皎日心猶昨每到窮途媿故人呈均弻先生沈緜風誼苦難􅁯流水行蹤過隙光海外經年勞悵望尊前永日訴淒涼可能廉吏逢優孟每爲傷人念孝章底事一身須愛惜生涯有盡國恩長柳塘柳塘春樹漸如絲水際煙生日暝時最是長條吹不定畫廊紅襃度來遲屠維大淵獻呈均弻先生屈指三年別驚心兩鬢絲風波經海慣雨露及春滋舉室仍蓬梗勞生比奕棋此身期報國應不歎官卑昭陽單閼鷲峯寺有感煙水淒迷顧一作欲問津數行高柳􅅖城闉重來濠上同遊地幾輩尊前健在身屈指年華猶昨日驚心言笑巳前塵吾衰每覺浮生促歲嵗還爲感逝人呈均弻先生江東久唱大馮君飮水清名達至尊六載寓公今守土兩番申命總殊恩身離㝛疾仍加健子列賢書更抱孫惟有舊時珠履客不知何處覓侯門秦淮雜詩明月東西十度圓車如流水到門前靑山黃土人多少鐙火笙歌似去年憶梅何日下西州一曲淸淮五月秋水閣畫簾人獨坐烏篷閱盡淚雙流白門感舊秋來無處不銷魂篋裏春衫半有痕到眼雲山隨處好傷心耆舊幾人存扁舟夜雨時聞笛落葉西風獨掩門十載江湖生白髮華年如水不堪論著雍涒灘江上江上愁心送客時秋風嫋嫋動相思武昌無限新栽柳偏向章臺折一枝依然被底有餘溫尚恐輕寒易中人最是夢迴呼不應昏鐙落月共棲神花開金谷幾經春一曲淸歌委路塵到底綠珠同日死季倫才是有情人失題西風官閣別平津醉酒懷恩一愴神舉世孤寒皆託命如公愛養更無人山林縱未成長往溝壑應能脱此身反恨南遊爲日晚當年負米最傷貧江干􅀉食自悽清舊雨新交各有情虛館晝長同隱几華筵日晩罷吹笙衰年可戀惟鄉土好事難􅁯是友生此後萍蹤何處合夢遊常到武昌城題機聲鐙影圖中年多病久不作詩比至居憂此事遂絶某出此卷索題有傷其事聊作數章以當一哭孤子汪中記乾隆五十三年十二月偏露遭天罰飢寒仰母􅄌自經風木痛長廢蓼莪詩嚴漏知冬盡殘舂迫歲􅂽米鹽來日計鐙下幾􅂞腸織成看满幅誦久聽終篇未覺寒宵永悠悠十五年夜長資火力天曉惜膏殘比似吾親苦煎熬漸欲乾裁到勝衣日長爲負米游巳知貧賤累仍作別離愁日短何由愛雲飛且自望百年將母計氣盡是空囊寡鵠應悲早銜魚忽就枯可憐八九子不及城上烏衣敝猶餘綫檠寒尚有膏盡人由顧復生我最劬勞空堂人獨坐微雨夜三更靜想童年事淒涼似隔生幾經白雲渡渡口水潺潺親年與流水一往俱不還須睂今老大兒女自團圞惆悵前宵夢依然厀下歡此情君不􅁯在昔我曾經歴歴傷心事披圖老淚零昭陽赤奮若贈别吳白庵尊酒河干客思沈風霜晩歲惜分襟每談泛梗嗟同命偶撥孤􅁌遇賞音薄祿巳虛將母志勞生長􅀒課耕心相期各有名山在極目南天起暮陰題曾賓谷都轉西溪漁隱圖爲愛神仙宅明湖一曲西水雲行處合春樹望中齊魚鳥情雖狎煙霞路轉迷玉堂明月夜長夢武林溪未遂歸田計應無泛宅一作下釣時簡書銷壯歲魚釣一作艇負前期良會陳宫閣遐心託畫師尚餘裵迪在追和􅜁川詩
